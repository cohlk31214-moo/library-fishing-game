<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海底圖書館 — 捕魚分類遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Righteous&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #03192e;
    --ocean1: #0a3d62;
    --ocean2: #0c6291;
    --ocean3: #1a8fbf;
    --foam: #a8e6f0;
    --gold: #f5c518;
    --coral: #ff6b6b;
    --green: #4ecdc4;
    --sand: #ffeaa7;
    --white: #f0faff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--deep);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    cursor: none;
  }



  /* ── CURSORS ── */
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,.8));
    transition: none;
  }

  #cursor.sub   #cursor-diver { display: none !important; }
  #cursor.diver #cursor-sub   { display: none !important; }
  #cursor.sub   #cursor-sub   { display: inline !important; }
  #cursor.diver #cursor-diver { display: inline !important; }
  #cursor.sub   { transform: translate(-4px, -20px); }
  #cursor.sub #cursor-sub { transform-origin: left center; }
  #cursor.diver { transform: translate(-20px, -28px); }
  #cursor.sub.clicking   { transform: translate(-4px,-20px) scale(.88) rotate(6deg); }
  #cursor.diver.clicking { transform: translate(-20px,-28px) scale(.9); }

  /* ── GOGGLE ZOOM TRANSITION ── */
  #goggle-overlay {
    position: fixed; inset: 0; z-index: 2000;
    display: none;
    align-items: center; justify-content: center;
    background: black;
    pointer-events: none;
  }
  #goggle-overlay.active { display: flex; }
  .goggle-frame {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .goggle-svg {
    width: 100vw; height: 100vh;
    animation: goggleZoom 1.8s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes goggleZoom {
    0%   { transform: scale(.12); opacity: 0; }
    20%  { opacity: 1; }
    55%  { transform: scale(1); opacity: 1; }
    80%  { transform: scale(1); opacity: 1; }
    100% { transform: scale(18); opacity: 0; }
  }

  /* ── OCEAN FADE IN ── */
  #ocean-reveal {
    position: fixed; inset: 0; z-index: 1500;
    background: black;
    pointer-events: none;
    opacity: 0;
    visibility: hidden;
  }
  #ocean-reveal.fade { animation: oceanReveal 1.4s ease forwards; }
  @keyframes oceanReveal {
    0%   { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }


  /* ── TREASURE CHEST ── */
  .chest {
    position: absolute;
    cursor: none;
    z-index: 10;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,.6));
    animation: chestBob 3s ease-in-out infinite alternate;
  }
  .chest:hover {
    filter: drop-shadow(0 8px 28px rgba(245,197,24,.6));
    animation: chestBobHover 3s ease-in-out infinite alternate;
  }
  @keyframes chestBob { from{transform:translateY(0)} to{transform:translateY(-7px)} }
  @keyframes chestBobHover { from{transform:translateY(0) scale(1.1)} to{transform:translateY(-7px) scale(1.1)} }
  .chest.opening { animation: chestOpen .5s ease forwards !important; pointer-events: none; }
  @keyframes chestOpen {
    0%  { transform: scale(1); opacity:1; }
    35% { transform: scale(1.3) rotate(-8deg); opacity:1; }
    65% { transform: scale(1.1) rotate(4deg); opacity:.7; }
    100%{ transform: scale(0) translateY(-80px); opacity:0; }
  }
  .chest-reward {
    position: fixed; z-index: 500; pointer-events: none;
    text-align: center; animation: rewardPop 1.8s ease forwards;
  }
  @keyframes rewardPop {
    0%  { opacity:1; transform:translateY(0) scale(.8); }
    25% { opacity:1; transform:translateY(-30px) scale(1.3); }
    70% { opacity:1; transform:translateY(-80px) scale(1); }
    100%{ opacity:0; transform:translateY(-130px) scale(.8); }
  }
  .chest-reward .r-icon { font-size:2.4rem; display:block; }
  .chest-reward .r-text {
    font-size:.88rem; font-weight:900;
    color:var(--gold); display:block;
    text-shadow:0 2px 8px rgba(0,0,0,.9);
    white-space:nowrap;
  }

  /* ── OCEAN BACKGROUND ── */
  #ocean {
    position: fixed; inset: 0;
    background: linear-gradient(180deg,
      #011627 0%, #03192e 20%, #0a3d62 55%, #0c6291 80%, #1565a8 100%);
    overflow: hidden;
  }

  /* bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(168,230,240,0.15);
    border: 1px solid rgba(168,230,240,0.3);
    animation: rise linear infinite;
    pointer-events: none;
  }
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: .6; }
    100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
  }

  /* light rays */
  .ray {
    position: absolute; top: -10%;
    width: 60px; height: 70vh;
    background: linear-gradient(180deg, rgba(168,230,240,.12) 0%, transparent 100%);
    transform-origin: top center;
    animation: sway 8s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes sway { from { transform: rotate(-6deg); } to { transform: rotate(6deg); } }

  /* seaweed */
  /* seaweed types */
  .weed {
    position: absolute; bottom: 0;
    transform-origin: bottom center;
    pointer-events: none;
  }
  @keyframes weedSway {
    0%   { transform: rotate(-8deg) scaleX(1); }
    30%  { transform: rotate(10deg) scaleX(0.95); }
    60%  { transform: rotate(-6deg) scaleX(1.02); }
    100% { transform: rotate(8deg)  scaleX(0.97); }
  }
  @keyframes weedSway2 {
    0%   { transform: rotate(6deg)  scaleX(0.98); }
    35%  { transform: rotate(-10deg) scaleX(1.03); }
    65%  { transform: rotate(8deg)  scaleX(0.96); }
    100% { transform: rotate(-7deg) scaleX(1); }
  }

  /* sand floor */
  #floor {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 110px;
    background: linear-gradient(180deg, #1a6b3e 0%, #c8a96e 30%, #e0c07a 100%);
    border-radius: 60% 60% 0 0 / 20px 20px 0 0;
    z-index: 5;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(1,22,39,.9) 0%, transparent 100%);
    z-index: 100;
    gap: 12px;
  }
  #hud .title {
    font-family: 'Righteous', cursive;
    font-size: 1.3rem;
    color: var(--foam);
    text-shadow: 0 0 20px rgba(168,230,240,.8);
    white-space: nowrap;
  }
  .stat-box {
    background: rgba(10,61,98,.7);
    border: 1px solid rgba(168,230,240,.3);
    border-radius: 12px;
    padding: 6px 16px;
    color: var(--foam);
    font-size: .85rem;
    text-align: center;
    backdrop-filter: blur(6px);
  }
  .stat-box span { display: block; font-size: 1.2rem; font-weight: 900; color: var(--gold); }

  /* category legend */
  #legend {
    position: fixed; right: 16px; top: 70px;
    display: flex; flex-direction: column; gap: 6px;
    z-index: 100;
  }
  .cat-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(1,22,39,.75);
    border-radius: 20px;
    padding: 5px 12px 5px 8px;
    font-size: .78rem;
    color: var(--white);
    border: 1.5px solid rgba(255,255,255,.15);
    backdrop-filter: blur(6px);
    cursor: default;
  }
  .cat-badge .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

  /* ── FISH ── */
  .fish {
    position: absolute;
    cursor: pointer;
    transition: transform .15s;
    z-index: 20;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
  }
  @keyframes fishBob {
    0%,100% { margin-top: 0px; }
    50%      { margin-top: -18px; }
  }
  .fish:hover { transform: scale(1.18); filter: drop-shadow(0 4px 20px rgba(255,255,255,.5)); }
  .fish.caught { animation: catchAnim .4s ease forwards; pointer-events: none; }
  @keyframes catchAnim {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.4) rotate(20deg); }
    100% { transform: scale(0) translateY(-80px); opacity: 0; }
  }

  .fish-label {
    position: absolute;
    bottom: -22px; left: 50%;
    transform: translateX(-50%);
    background: rgba(1,22,39,.85);
    color: var(--foam);
    font-size: .72rem;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
    border: 1px solid rgba(168,230,240,.3);
  }

  /* ── FISHING NET (drag zone) ── */
  #net-area {
    position: fixed;
    left: 16px; bottom: 90px;
    width: 340px;
    z-index: 50;
  }
  #net-area h3 {
    color: var(--foam); font-size: .85rem; margin-bottom: 8px;
    text-shadow: 0 1px 6px rgba(0,0,0,.8);
  }

  .bucket-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .bucket {
    flex: 1; min-width: 72px;
    background: rgba(10,61,98,.6);
    border: 2px dashed rgba(168,230,240,.4);
    border-radius: 14px;
    padding: 8px 6px;
    text-align: center;
    transition: border-color .2s, background .2s;
    cursor: default;
    min-height: 80px;
  }
  .bucket.drag-over {
    border-color: var(--gold);
    background: rgba(245,197,24,.15);
  }
  .bucket .b-icon { font-size: 1.6rem; }
  .bucket .b-label { font-size: .7rem; color: var(--foam); margin-top: 2px; line-height: 1.2; }
  .bucket .b-count {
    font-size: .75rem; color: var(--gold); font-weight: 700;
    margin-top: 4px;
  }

  /* ── QUESTION CARD ── */
  #question-card {
    position: fixed;
    top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(3,25,46,.9);
    border: 1.5px solid rgba(168,230,240,.35);
    border-radius: 20px;
    padding: 14px 22px;
    max-width: 380px;
    width: 90%;
    z-index: 200;
    color: var(--white);
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    display: none;
  }
  #question-card h2 { font-size: 1rem; margin-bottom: 10px; color: var(--foam); }
  #question-card .book-name {
    font-size: 1.15rem; font-weight: 900; color: var(--gold);
    margin-bottom: 14px;
  }
  #question-card .opts {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .opt-btn {
    background: rgba(10,61,98,.8);
    border: 1.5px solid rgba(168,230,240,.3);
    border-radius: 12px;
    color: var(--white);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: .82rem;
    padding: 10px 8px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px; justify-content: center;
  }
  .opt-btn:hover { border-color: var(--gold); background: rgba(245,197,24,.2); }
  .opt-btn.correct { border-color: var(--green); background: rgba(78,205,196,.3); animation: pulse .4s; }
  .opt-btn.wrong   { border-color: var(--coral); background: rgba(255,107,107,.3); animation: shake .4s; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ── FEEDBACK TOAST ── */
  #toast {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(.8);
    background: rgba(3,25,46,.95);
    border-radius: 20px;
    padding: 20px 34px;
    text-align: center;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s, transform .25s;
    border: 2px solid var(--foam);
  }
  #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); pointer-events: auto; }
  #toast .t-icon { font-size: 2.8rem; }
  #toast .t-msg  { font-size: 1rem; color: var(--white); margin-top: 8px; }
  #toast .t-hint { font-size: .8rem; color: var(--foam); margin-top: 4px; opacity: .8; }

  /* ── GAME OVER ── */
  #gameover {
    position: fixed; inset: 0;
    background: rgba(1,22,39,.92);
    display: none; align-items: center; justify-content: center;
    z-index: 500;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(8px);
  }
  #gameover h1 { font-family:'Righteous',cursive; font-size:2.5rem; color:var(--gold); text-align:center; }
  #gameover p  { color: var(--foam); font-size:1rem; text-align:center; }
  #gameover button {
    background: var(--ocean2); color: var(--white);
    border: 2px solid var(--foam); border-radius: 30px;
    padding: 12px 36px; font-size: 1rem; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background .2s;
  }
  #gameover button:hover { background: var(--ocean3); }

  /* ── PROGRESS BAR ── */
  #prog-wrap {
    position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%);
    width: 200px; z-index: 100;
  }
  #prog-bar {
    height: 6px; border-radius: 6px;
    background: rgba(168,230,240,.2);
    overflow: hidden;
  }
  #prog-fill {
    height: 100%; background: var(--gold);
    border-radius: 6px;
    transition: width .4s;
    width: 0%;
  }
  #prog-label { text-align:center; font-size:.72rem; color:var(--foam); margin-top:3px; opacity:.8; }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed; inset: 0; z-index: 1000;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #intro.hide {
    animation: introFadeOut .6s ease forwards;
    pointer-events: none;
  }
  @keyframes introFadeOut { to { opacity: 0; visibility: hidden; } }

  /* ── INTRO OCEAN BACKGROUND ── */
  #intro-ocean {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      #b8eaf7 0%, #7dd4ef 10%,
      #4ab8e0 25%, #2196c8 45%,
      #1565a0 65%, #0e4a80 82%, #0a3562 100%);
  }

  /* sun rays from surface */
  .i-ray {
    position: absolute; top: 0;
    width: 80px; height: 65%;
    background: linear-gradient(180deg, rgba(255,255,255,.22) 0%, transparent 100%);
    transform-origin: top center;
    animation: iRaySway 6s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes iRaySway { from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }

  /* water surface shimmer */
  #intro-surface {
    position: absolute; top: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(180deg, #87ceeb 0%, rgba(135,206,235,.0) 100%);
    overflow: hidden;
  }
  .wave-line {
    position: absolute; left: -100%; width: 300%;
    height: 14px; border-radius: 50%;
    background: rgba(255,255,255,.35);
    animation: waveMov linear infinite;
  }
  @keyframes waveMov { from{transform:translateX(0)} to{transform:translateX(33.3%)} }

  /* ── SHIP ON SURFACE ── */
  #intro-ship {
    position: absolute; top: 14px; left: -220px;
    animation: shipSail 38s linear infinite;
    pointer-events: none;
    z-index: 12;
  }
  @keyframes shipSail {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 260px)); }
  }

  /* rocks / coral floor */
  #intro-floor {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(180deg, transparent 0%, #1a4a2a 25%, #2a6a30 55%, #d4b87a 100%);
    border-radius: 30% 40% 0 0 / 20px 25px 0 0;
    overflow: visible;
  }

  /* coral decorations */
  .i-coral {
    position: absolute; bottom: 0;
    animation: coralSway 4s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  @keyframes coralSway { from{transform:rotate(-8deg)} to{transform:rotate(8deg)} }

  /* fish swimming in intro */
  .i-fish {
    position: absolute;
    animation: fishSwim linear infinite;
    pointer-events: none;
    opacity: .85;
  }
  /* fish going LEFT→RIGHT: translateX only, wrapper has scaleX(-1) to face right */
  @keyframes fishSwimR {
    from { transform: translateX(-90px); }
    to   { transform: translateX(calc(100vw + 90px)); }
  }
  /* fish going RIGHT→LEFT: start off right, travel to left, no flip needed */
  @keyframes fishSwimL {
    from { transform: translateX(calc(100vw + 90px)); }
    to   { transform: translateX(-90px); }
  }

  /* bubbles */
  .i-bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    border: 1px solid rgba(255,255,255,.4);
    animation: iBubble linear infinite;
    pointer-events: none;
  }
  @keyframes iBubble {
    from { transform: translateY(0); opacity: .7; }
    to   { transform: translateY(-55vh); opacity: 0; }
  }

  /* ── INTRO PANEL ── */
  #intro-panel {
    position: relative; z-index: 20;
    background: rgba(2, 18, 38, 0.82);
    border: 2px solid rgba(168,230,240,.4);
    border-radius: 22px;
    padding: 28px 36px 24px;
    max-width: 510px; width: 88%;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(0,0,0,.7), 0 0 0 1px rgba(168,230,240,.1);
    animation: panelIn .9s .2s cubic-bezier(.17,.67,.35,1.25) both;
  }
  @keyframes panelIn {
    from { transform: scale(.75) translateY(24px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  #intro-panel h1 {
    font-family: 'Righteous', cursive;
    font-size: 1.9rem; color: var(--gold);
    text-shadow: 0 0 28px rgba(245,197,24,.85);
    margin-bottom: 4px;
  }
  #intro-panel .subtitle {
    font-size: .83rem; color: var(--foam); opacity: .85; margin-bottom: 18px;
  }
  .rules-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 9px; margin-bottom: 16px;
  }
  .rule-card {
    background: rgba(10,61,98,.55);
    border: 1px solid rgba(168,230,240,.2);
    border-radius: 14px; padding: 11px 8px; text-align: center;
  }
  .rule-card .rc-icon { font-size: 1.7rem; display:block; margin-bottom:3px; }
  .rule-card .rc-title { font-size: .76rem; color: var(--gold); font-weight:700; margin-bottom:2px; }
  .rule-card .rc-desc  { font-size: .7rem; color: var(--foam); opacity:.85; line-height:1.4; }
  .chest-section {
    background: rgba(100,60,0,.35);
    border: 1px solid rgba(245,197,24,.3);
    border-radius: 14px; padding: 10px 14px; margin-bottom: 18px;
  }
  .chest-section h3 { color: var(--gold); font-size:.85rem; margin-bottom:7px; }
  .chest-list { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; }
  .chest-item {
    background: rgba(10,61,98,.5); border-radius: 20px;
    padding: 3px 10px; font-size: .72rem; color: var(--foam);
    border: 1px solid rgba(168,230,240,.2);
  }
  #start-btn {
    background: linear-gradient(135deg, #0c6291, #0a3d62);
    color: #fff; border: 2px solid var(--gold); border-radius: 30px;
    padding: 13px 44px; font-size: 1.05rem; font-weight:900;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; letter-spacing: .05em;
    box-shadow: 0 4px 20px rgba(12,98,145,.6);
    animation: btnPulse 2s ease-in-out infinite;
    transition: transform .15s;
  }
  #start-btn:hover { transform: scale(1.06); }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(12,98,145,.6), 0 0 0 4px rgba(168,230,240,.15); }
    50%      { box-shadow: 0 4px 30px rgba(12,98,145,.9), 0 0 0 8px rgba(168,230,240,.3); }
  }


  /* ── TITLE TYPEWRITER ── */
  #intro-title {
    font-family: 'Righteous', cursive;
    font-size: 2.1rem; color: var(--gold);
    text-shadow: 0 0 28px rgba(245,197,24,.85);
    margin-bottom: 4px;
    min-height: 2.6rem;
    letter-spacing: .06em;
  }
  .title-char {
    display: inline-block;
    opacity: 0;
    transform: translateY(18px) scale(.7);
    animation: charIn .45s cubic-bezier(.17,.67,.35,1.3) forwards;
  }
  @keyframes charIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* rules fade-in after title */
  #intro-rules {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .6s ease, transform .6s ease;
  }
  #intro-rules.visible { opacity: 1; transform: translateY(0); }
  #start-btn { opacity: 0; transition: opacity .5s ease .2s; }
  #start-btn.visible { opacity: 1; }

  /* ── GOGGLE TRANSITION ── */
  #goggle-overlay {
    position: fixed; inset: 0; z-index: 2001;
    display: none;
    background: transparent;
    pointer-events: none;
  }
  /* The POV ocean scene shown through goggle lenses */
  #goggle-ocean-scene {
    position: fixed; inset: 0; z-index: 2002;
    display: none;
    background: linear-gradient(180deg,
      #7dd4ef 0%, #4ab8e0 20%, #2196c8 45%, #1565a0 70%, #0a3562 100%);
    pointer-events: none;
  }
  /* Ocean reveal - dissolve in from black */

/* Fish R→L: starts off right, travels left */
.fish-rl-a { animation: fishRLa 7s linear infinite; }

.book-drift-3 { animation: bDrift3 15s ease-in-out infinite; animation-delay:-7s; }
.book-drift-4 { animation: bDrift4 11s ease-in-out infinite; animation-delay:-2s; }
.book-drift-5 { animation: bDrift5 12s ease-in-out infinite; animation-delay:-9s; }
@keyframes bDrift6 {
  0%   { transform: rotate(-8deg) translate(0,0); }
  40%  { transform: rotate(-12deg) translate(6px,-22px); }

  100% { transform: rotate(-8deg) translate(0,0); }
}
.book-drift-6 { animation: bDrift6 14s ease-in-out infinite; animation-delay:-6s; }

@keyframes bDrift2 { 0%,100%{transform:rotate(-14deg) translate(0,0)} 35%{transform:rotate(-10deg) translate(-10px,-24px)} 70%{transform:rotate(-17deg) translate(6px,-12px)} }
@keyframes bDrift3 { 0%,100%{transform:translate(0,0) rotate(0deg)}   50%{transform:translate(10px,-28px) rotate(-5deg)} }

@keyframes bDrift5 { 0%,100%{transform:rotate(10deg) translate(0,0)}  45%{transform:rotate(6deg) translate(-8px,-18px)} }

.bub-b { animation: bubRise 5.8s ease-in-out infinite; animation-delay:-1.2s; }
.bub-c { animation: bubRise 5.0s ease-in-out infinite; animation-delay:-2.5s; }

let score=0, combo=0, lives=3, timeLeft=60, caught=0;

// ─── OCEAN DECORATION ───────────────────────────────────────────────────
function buildOcean() {
  const ocean = document.getElementById('ocean');
  // rays
  for(let i=0;i<6;i++){
    const r=document.createElement('div'); r.className='ray';
    r.style.left=(8+i*16)+'%';
    r.style.animationDelay=(i*1.3)+'s';
    r.style.opacity=.4+Math.random()*.3;
    ocean.appendChild(r);
  }
  // bubbles
  for(let i=0;i<22;i++) spawnBubble(ocean,true);
  // weeds — two types like reference image
  const floor = document.getElementById('floor');

  // Type A: feathery/branching (羽毛狀) — thin stem with side branches
  function makeFernWeed(x, h, delay, dur) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    const w = h * 0.6;
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.classList.add('weed');
    svg.style.left = x;
    svg.style.animationName = Math.random()>.5 ? 'weedSway' : 'weedSway2';
    svg.style.animationDuration = dur + 's';
    svg.style.animationDelay = delay + 's';
    svg.style.animationTimingFunction = 'ease-in-out';
    svg.style.animationIterationCount = 'infinite';
    const cx = w/2;
    const g1 = '#1a7a3e', g2 = '#25a855';
    // Main stem
    let d = `M${cx} ${h} Q${cx-4} ${h*0.6} ${cx} ${h*0.1}`;
    const stem = document.createElementNS('http://www.w3.org/2000/svg','path');
    stem.setAttribute('d', d);
    stem.setAttribute('stroke', g1);
    stem.setAttribute('stroke-width', '3.5');
    stem.setAttribute('fill', 'none');
    stem.setAttribute('stroke-linecap', 'round');
    svg.appendChild(stem);
    // Branches — alternating left/right
    const numBranches = Math.floor(4 + Math.random()*3);
    for(let i=0;i<numBranches;i++){
      const t = 0.15 + (i/(numBranches-1))*0.7;
      const bx = cx + (cx-4)*(-1 + 2*(t)); // slight curve following stem
      const by = h - (h*0.85)*t;
      const side = i%2===0 ? -1 : 1;
      const bLen = (8 + Math.random()*14) * (1-t*0.4);
      const br = document.createElementNS('http://www.w3.org/2000/svg','path');
      br.setAttribute('d', `M${cx} ${by} Q${cx+side*bLen*0.6} ${by-bLen*0.3} ${cx+side*bLen} ${by-bLen*0.8}`);
      br.setAttribute('stroke', g2);
      br.setAttribute('stroke-width', '2');
      br.setAttribute('fill', 'none');
      br.setAttribute('stroke-linecap', 'round');
      svg.appendChild(br);
      // Sub-branches on larger branches
      if(bLen > 14) {
        const sb = document.createElementNS('http://www.w3.org/2000/svg','path');
        const mx = cx+side*bLen*0.5, my = by-bLen*0.25;
        sb.setAttribute('d',`M${mx} ${my} Q${mx+side*6} ${my-8} ${mx+side*10} ${my-4}`);
        sb.setAttribute('stroke', g2); sb.setAttribute('stroke-width','1.5');
        sb.setAttribute('fill','none'); sb.setAttribute('stroke-linecap','round');
        svg.appendChild(sb);
      }
    }
    floor.appendChild(svg);
  }

  // Type B: wide-leaf kelp (寬葉海草) — wavy broad blade
  function makeKelpWeed(x, h, delay, dur) {
    const w = Math.round(h * 0.55);
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.classList.add('weed');
    svg.style.left = x;
    svg.style.animationName = Math.random()>.5 ? 'weedSway' : 'weedSway2';
    svg.style.animationDuration = dur + 's';
    svg.style.animationDelay = delay + 's';
    svg.style.animationTimingFunction = 'ease-in-out';
    svg.style.animationIterationCount = 'infinite';
    const cx = w/2;
    const col1='#1e8c3a', col2='#27ae60', col3='#2ecc71';
    // Wavy leaf blade shape
    const leaf = document.createElementNS('http://www.w3.org/2000/svg','path');
    const lw = w*0.38;
    leaf.setAttribute('d', 
      `M${cx} ${h}
       C${cx-lw} ${h*0.75} ${cx+lw*1.2} ${h*0.55} ${cx-lw*0.8} ${h*0.35}
       C${cx+lw*0.5} ${h*0.18} ${cx-lw*0.3} ${h*0.08} ${cx} ${0}
       C${cx+lw*0.3} ${h*0.08} ${cx+lw*0.8} ${h*0.18} ${cx-lw*0.5+lw*0.3} ${h*0.38}
       C${cx+lw*1.0} ${h*0.55} ${cx-lw*0.8} ${h*0.75} ${cx} ${h} Z`
    );
    leaf.setAttribute('fill', col2);
    leaf.setAttribute('opacity','0.92');
    svg.appendChild(leaf);
    // Midrib
    const rib = document.createElementNS('http://www.w3.org/2000/svg','path');
    rib.setAttribute('d',`M${cx} ${h} C${cx-4} ${h*0.6} ${cx+3} ${h*0.3} ${cx} 0`);
    rib.setAttribute('stroke', col1);
    rib.setAttribute('stroke-width','2');
    rib.setAttribute('fill','none');
    svg.appendChild(rib);
    // Highlight sheen
    const shine = document.createElementNS('http://www.w3.org/2000/svg','path');
    shine.setAttribute('d',`M${cx+2} ${h*0.8} C${cx+lw*0.3} ${h*0.6} ${cx-lw*0.1} ${h*0.4} ${cx+lw*0.1} ${h*0.15}`);
    shine.setAttribute('stroke',col3);
    shine.setAttribute('stroke-width','2.5');
    shine.setAttribute('fill','none');
    shine.setAttribute('opacity','0.55');
    svg.appendChild(shine);
    floor.appendChild(svg);
  }

  // ── CORAL shapes ──────────────────────────────────────────────
  function makeCoral(x, h, color) {
    const w = h * 0.9;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.classList.add('weed');
    svg.style.left = x;
    svg.style.animationName = 'weedSway';
    svg.style.animationDuration = (4+Math.random()*3)+'s';
    svg.style.animationDelay = (Math.random()*4)+'s';
    svg.style.animationTimingFunction = 'ease-in-out';
    svg.style.animationIterationCount = 'infinite';
    const cx = w/2, type = Math.floor(Math.random()*3);
    if(type===0) {
      // branching coral — Y shapes
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      function branch(x1,y1,x2,y2,depth){
        const p=document.createElementNS('http://www.w3.org/2000/svg','line');
        p.setAttribute('x1',x1);p.setAttribute('y1',y1);p.setAttribute('x2',x2);p.setAttribute('y2',y2);
        p.setAttribute('stroke',color);p.setAttribute('stroke-width',Math.max(1,depth*1.5));
        p.setAttribute('stroke-linecap','round');g.appendChild(p);
        if(depth>0){const len=Math.sqrt((x2-x1)**2+(y2-y1)**2)*0.65;const ang=Math.atan2(y2-y1,x2-x1);
          branch(x2,y2,x2+Math.cos(ang-0.6)*len,y2+Math.sin(ang-0.6)*len,depth-1);
          branch(x2,y2,x2+Math.cos(ang+0.6)*len,y2+Math.sin(ang+0.6)*len,depth-1);}
      }
      branch(cx,h,cx,h*0.4,3); svg.appendChild(g);
    } else if(type===1) {
      // fan coral — semi-circle fan
      for(let a=-70;a<=70;a+=12){
        const rad=a*Math.PI/180, len=h*0.85;
        const p=document.createElementNS('http://www.w3.org/2000/svg','line');
        p.setAttribute('x1',cx);p.setAttribute('y1',h);
        p.setAttribute('x2',cx+Math.sin(rad)*len);p.setAttribute('y2',h-Math.cos(rad)*len);
        p.setAttribute('stroke',color);p.setAttribute('stroke-width','2');
        p.setAttribute('stroke-linecap','round');p.setAttribute('opacity','0.85');svg.appendChild(p);
      }
      // connect with arcs
      for(let i=0;i<3;i++){
        const r=(h*0.25)*(i+1)*0.35;
        const arc=document.createElementNS('http://www.w3.org/2000/svg','path');
        arc.setAttribute('d',`M${cx-r*1.8} ${h-r*1.1} Q${cx} ${h-r*1.5} ${cx+r*1.8} ${h-r*1.1}`);
        arc.setAttribute('stroke',color);arc.setAttribute('stroke-width','1.5');
        arc.setAttribute('fill','none');arc.setAttribute('opacity','0.6');svg.appendChild(arc);
      }
    } else {
      // bubble/round coral — stacked circles
      const colors2=[color, color+'cc', color+'99'];
      [[cx,h*0.55,h*0.22],[cx-h*0.18,h*0.7,h*0.18],[cx+h*0.15,h*0.68,h*0.16],
       [cx,h*0.35,h*0.15],[cx-h*0.1,h*0.5,h*0.12]].forEach(([bx,by,r],j)=>{
        const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx',bx);c.setAttribute('cy',by);c.setAttribute('r',r);
        c.setAttribute('fill',colors2[j%3]);c.setAttribute('opacity','0.88');svg.appendChild(c);
        const shine=document.createElementNS('http://www.w3.org/2000/svg','circle');
        shine.setAttribute('cx',bx-r*0.3);shine.setAttribute('cy',by-r*0.3);shine.setAttribute('r',r*0.25);
        shine.setAttribute('fill','white');shine.setAttribute('opacity','0.3');svg.appendChild(shine);
      });
    }
    floor.appendChild(svg);
  }

  // ── JELLYFISH (decorative, floating above floor) ──
  function makeJellyfish(x, forceSize, forceColor) {
    const div = document.createElement('div');
    const size = forceSize || (18 + Math.random()*34);
    const palettes = [
      ['#ff9eb5','#ff6b9d'],['#c77dff','#9b5de5'],['#74c0fc','#4dabf7'],
      ['#ff6b6b','#fa5252'],['#a9def9','#74b9ff'],['#ffd6a5','#ffb347'],
      ['#caffbf','#52b788'],['#e0c3fc','#b197fc']
    ];
    const pal = forceColor ? [forceColor,forceColor] : palettes[Math.floor(Math.random()*palettes.length)];
    const col = pal[0], col2 = pal[1];
    const bottom = 65 + Math.random()*200;
    div.style.cssText = `position:absolute;bottom:${bottom}px;left:${x};pointer-events:none;`+
      `animation:jellyFloat ${3.5+Math.random()*4}s ease-in-out infinite;`+
      `animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    // tentacle count varies
    const tentacles = 5 + Math.floor(Math.random()*4);
    let tentSVG = '';
    for(let i=0;i<tentacles;i++){
      const tx = 4 + (i/(tentacles-1))*32;
      const wavex = (i%2===0?-1:1)*(3+Math.random()*5);
      tentSVG += `<path d="M${tx} 30 Q${tx+wavex} ${38+Math.random()*8} ${tx-wavex*0.5} ${48+Math.random()*10}" stroke="${col2}" stroke-width="${0.8+Math.random()*1.2}" fill="none" opacity="${0.55+Math.random()*0.3}"/>`;
    }
    div.innerHTML = `<svg width="${size}" height="${size*1.6}" viewBox="0 0 40 64">
      <defs>
        <radialGradient id="jg${Math.round(Math.random()*9999)}" cx="40%" cy="35%">
          <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="${col}" stop-opacity="0.8"/>
        </radialGradient>
      </defs>
      <ellipse cx="20" cy="17" rx="18" ry="15" fill="${col}" opacity="0.72"/>
      <ellipse cx="20" cy="17" rx="14" ry="11" fill="white" opacity="0.18"/>
      <ellipse cx="14" cy="13" rx="5"  ry="3"  fill="white" opacity="0.25"/>
      <path d="M2 22 Q20 28 38 22" stroke="${col}" stroke-width="2" fill="${col}" opacity="0.35"/>
      ${tentSVG}
    </svg>`;
    floor.appendChild(div);
  }

  // ── CSS for jellyfish float ──
  // ── ROCK CLUSTERS with seaweed on top ──
  function makeRockCluster(x, side) {
    const floor = document.getElementById('floor');
    const floorH = 110; // floor div height in px
    const rc1='#7a6448', rc2='#9a8060', rc3='#5e4a30', rc4='#b8966a';

    // Each rock cluster = 1 SVG with irregular polygon rocks
    // SVG is 160x55, rocks fill bottom portion, sit flush at y=55
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    const scale = 0.8 + Math.random()*0.5;
    const svgW = Math.round(160*scale), svgH = Math.round(55*scale);
    svg.setAttribute('width', svgW);
    svg.setAttribute('height', svgH);
    // viewBox: content sits in 0..160 x 0..55, rocks touch y=55
    svg.setAttribute('viewBox','0 0 160 55');
    svg.setAttribute('preserveAspectRatio','xMidYMax meet');
    svg.style.cssText = 'display:block;';

    // 3 irregular polygon rocks — jagged edges, all max-y=55
    svg.innerHTML = `
      <polygon points="2,55 0,42 5,30 15,22 30,18 46,20 57,28 62,40 60,55" fill="${rc3}"/>
      <polygon points="8,55 6,44 10,33 22,25 36,22 50,24 58,32 60,44 58,55" fill="${rc1}"/>
      <polygon points="16,48 20,30 32,24 44,26 52,34 48,48" fill="${rc2}" opacity="0.7"/>
      <polygon points="98,55 95,40 98,28 110,20 128,16 146,19 155,28 158,42 156,55" fill="${rc3}"/>
      <polygon points="102,55 100,42 104,30 115,23 130,20 148,22 154,32 156,44 154,55" fill="${rc1}"/>
      <polygon points="108,46 112,28 124,22 138,24 148,33 144,46" fill="${rc2}" opacity="0.65"/>
      <polygon points="66,55 63,44 66,36 74,28 88,25 100,29 104,40 102,55" fill="${rc3}" opacity="0.9"/>
      <polygon points="68,55 66,46 70,38 78,32 90,30 100,34 100,46 98,55" fill="${rc1}" opacity="0.8"/>
    `;

    // Place SVG inside floor div, absolutely at bottom
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:absolute;bottom:0;left:${x};pointer-events:none;z-index:4;line-height:0;`;
    wrapper.appendChild(svg);
    floor.appendChild(wrapper);

    // Mini weeds/corals growing from the rocks — also inside floor
    const numW = 2 + Math.floor(Math.random()*3);
    for(let i=0;i<numW;i++){
      const wh = 20+Math.random()*30;
      const baseX = parseFloat(x);
      const offsetX = (i - (numW-1)/2) * 3.5;
      const wx = `${baseX + offsetX}%`;
      const wd = (Math.random()*3).toFixed(1);
      const wdur = (2.5+Math.random()*2.5).toFixed(1);
      const r = Math.random();
      if(r<0.4) makeFernWeed(wx,wh,wd,wdur);
      else if(r<0.72) makeKelpWeed(wx,wh,wd,wdur);
      else makeCoral(wx,wh,['#ff6b9d','#ff9f43','#a29bfe','#74b9ff','#55efc4','#e17055'][Math.floor(Math.random()*6)]);
    }
  }

    if(!document.getElementById('sea-creature-css')){
    const st=document.createElement('style');st.id='sea-creature-css';
    st.textContent=`@keyframes jellyFloat{0%,100%{transform:translateY(0) scaleX(1)}40%{transform:translateY(-14px) scaleX(0.9)}70%{transform:translateY(-6px) scaleX(1.05)}}`;
    document.head.appendChild(st);
  }

  // ── Place dense varied flora ──
  // Mix of thin fern, wide kelp, coral, with varied heights
  const plantDefs = [
    // [positionPct, type, heightScale, isBold]
    // type: 0=fern,1=kelp,2=coral
  ];
  // Generate dense positions
  for(let i=0;i<52;i++){
    const pct = (i/51)*98 + (Math.random()*2-1);
    plantDefs.push([Math.max(0.5,Math.min(99,pct)), Math.floor(Math.random()*3), 1]);
  }
  // Add extra-bold wide kelp every ~8 positions
  [5,14,22,31,40,49,60,69,78,88,95].forEach(p => {
    plantDefs.push([p + Math.random()*3-1.5, 1, 1.8]); // bold kelp
  });

  plantDefs.forEach(([pct, type, scale]) => {
    const baseH = 32 + Math.random()*50;
    const h = baseH * scale;
    const delay = (Math.random()*5).toFixed(1);
    const dur   = (2.8+Math.random()*3.5).toFixed(1);
    const x = pct + '%';
    const coralColors = ['#ff6b9d','#ff9f43','#ffeaa7','#a29bfe','#fd79a8','#e17055','#74b9ff','#55efc4','#ff6348','#eccc68'];
    if(type===0)      makeFernWeed(x, h, delay, dur);
    else if(type===1) makeKelpWeed(x, h, delay, dur);
    else              makeCoral(x, h, coralColors[Math.floor(Math.random()*coralColors.length)]);
  });

  // Rock clusters left and right sides
  makeRockCluster('1%', 'left');
  makeRockCluster('6%', 'left');
  makeRockCluster('88%', 'right');
  makeRockCluster('93%', 'right');
  // A couple in the middle too
  makeRockCluster('38%', 'mid');
  makeRockCluster('62%', 'mid');

  // Jellyfish — evenly spread across full width, varied sizes/colors
  const jellyData = [
    [2,'#ff9eb5',16],[9,'#c77dff',28],[16,'#74c0fc',20],[23,'#ffd6a5',32],
    [30,'#a9def9',18],[37,'#caffbf',26],[44,'#e0c3fc',22],[51,'#ff6b6b',14],
    [58,'#74b9ff',30],[65,'#ffb347',24],[72,'#b197fc',36],[79,'#52b788',20],
    [86,'#fa5252',18],[93,'#4dabf7',28],[6,'#eccc68',14],[42,'#55efc4',22],
    [77,'#fd79a8',16]
  ];
  jellyData.forEach(([p,col,sz]) => makeJellyfish(p+'%', sz, col));
}

function spawnBubble(parent, init=false){
  const b=document.createElement('div'); b.className='bubble';
  const sz=4+Math.random()*16;
  b.style.width=sz+'px'; b.style.height=sz+'px';
  b.style.left=(Math.random()*100)+'%';
  b.style.bottom=init?(Math.random()*100)+'%':'0';
  const dur=6+Math.random()*10;
  b.style.animationDuration=dur+'s';
  b.style.animationDelay=(Math.random()*8)+'s';
  parent.appendChild(b);
  setTimeout(()=>{ b.remove(); spawnBubble(parent); }, (dur+8)*1000);
}

    d.innerHTML=`<div class="dot" style="background:${c.color}"></div>${c.emoji} ${c.id} ${c.label}`;
    leg.appendChild(d);
  });
}

// ─── FISH SPAWNING ────────────────────────────────────────────────────────
function spawnFish(bookData){
  const cat = CATEGORIES.find(c=>c.id===bookData.cat);

  // Wrapper keeps position; label lives here (never flipped)
  const wrapper = document.createElement('div');
  wrapper.className='fish';
  wrapper.style.position='absolute';

  // Inner element holds the SVG fish body (this gets flipped)
  const body = document.createElement('div');
  body.className='fish-body';
  body.style.display='inline-block';

  const shapeIdx = Math.floor(Math.random()*FISH_SHAPES.length);
  const scale = 0.85 + Math.random()*0.4;
  body.innerHTML = FISH_SHAPES[shapeIdx](cat.color, scale);

  // label on wrapper — never affected by body flip
  const lbl=document.createElement('div'); lbl.className='fish-label';
  lbl.textContent=bookData.title;

  wrapper.appendChild(body);
  wrapper.appendChild(lbl);

  // position: random in ocean area (avoid HUD and floor)
  const topMin=80, topMax=window.innerHeight-160;
  const leftMin=60, leftMax=window.innerWidth-180;
  const top = topMin + Math.random()*(topMax-topMin);
  const left = leftMin + Math.random()*(leftMax-leftMin);
  wrapper.style.top=top+'px';
  wrapper.style.left=left+'px';

  // FISH_SHAPES: nose LEFT, tail RIGHT → fish naturally swims LEFT
  // dir=+1 → swims right → flip body: scaleX(-1)
  // dir=-1 → swims left  → no flip
  const dir = Math.random()>.5?1:-1;
  if(dir>0) body.style.transform='scaleX(-1)';

  wrapper.addEventListener('click',()=>onFishClick(wrapper, bookData));

  document.body.appendChild(wrapper);

  // Fish swims across screen continuously in dir direction
  // Start: positioned at random spot; swim to off-screen edge, wrap to other side
  const swimDur = 18 + Math.random()*16; // seconds to cross screen
  const W = window.innerWidth;
  const startX = parseFloat(wrapper.style.left);

  if(dir > 0) {
    // swim RIGHT: from current pos → off right → reset to off left → repeat
    const toRight = W + 160 - startX;
    const fromLeft = -(startX + 160);
    wrapper.animate([
      {transform: 'translateX(0px)'},
      {transform: `translateX(${toRight}px)`}
    ],{
      duration: swimDur * 1000,
      iterations: Infinity,
      easing: 'linear'
    });
  } else {
    // swim LEFT: from current pos → off left → reset to off right → repeat
    const toLeft = -(startX + 160);
    wrapper.animate([
      {transform: 'translateX(0px)'},
      {transform: `translateX(${toLeft}px)`}
    ],{
      duration: swimDur * 1000,
      iterations: Infinity,
      easing: 'linear'
    });
  }
  // Gentle vertical bob layered on top via CSS animation
  wrapper.style.animation = `fishBob ${3+Math.random()*3}s ease-in-out infinite`;
  wrapper.style.animationDelay = `-${Math.random()*3}s`;

  activeFish.push({el: wrapper, bookData});
  return wrapper;
}

// ─── QUESTION LOGIC ──────────────────────────────────────────────────────
function onFishClick(el, bookData){
  if(!gameRunning || currentFish || toastShowing) return;
  currentFish = {el, bookData};

  // pick 3 wrong options + 1 correct
  const correct = CATEGORIES.find(c=>c.id===bookData.cat);
  let others = CATEGORIES.filter(c=>c.id!==bookData.cat);
  others = shuffle(others).slice(0,3);
  const opts = shuffle([correct, ...others]);

  document.getElementById('qbook').textContent = '《' + bookData.title + '》';
  const optsDiv = document.getElementById('qopts');
  optsDiv.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.innerHTML=`${o.emoji} ${o.id}<br>${o.label}`;
    btn.style.borderColor = o.color+'66';
    btn.addEventListener('click',()=>onAnswer(btn, o.id===bookData.cat, correct, o));
    optsDiv.appendChild(btn);
  });

  document.getElementById('question-card').style.display='block';
}

function onAnswer(btn, isCorrect, correctCat, chosen){
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  // Hide question card IMMEDIATELY so toast never overlaps it
  document.getElementById('question-card').style.display='none';
  if(isCorrect){
    btn.classList.add('correct');
    combo++; score += 10 + (combo>1?(combo-1)*5:0);
    answered++;
    showToast('✅','答對了！', `${correctCat.emoji} ${correctCat.id} — ${correctCat.label}（+${10+(combo>1?(combo-1)*5:0)}分）`);
    setTimeout(()=>{
      removeFish(currentFish.el);
      currentFish=null;
      caught++;
      updateHUD();
      checkWin();
    },400);
  } else {
    btn.classList.add('wrong');
    combo=0; lives--;
    showToast('❌','答錯了！', `正確答案：${correctCat.emoji} ${correctCat.id} — ${correctCat.label}`);
    setTimeout(()=>{
      currentFish=null;
      updateHUD();
      if(lives<=0) endGame();
    },400);
  }
  updateHUD();
}

function closeQuestion(){
  document.getElementById('question-card').style.display='none';
  currentFish=null;
}

function removeFish(el){
  el.classList.add('caught');
  setTimeout(()=>el.remove(),500);
  activeFish = activeFish.filter(f=>f.el!==el);
}

// ─── HUD ─────────────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('combo-val').textContent=combo;
  document.getElementById('lives-val').textContent='❤️'.repeat(Math.max(0,lives));
  const pct = totalBooks>0?(caught/totalBooks*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`已捕 ${caught} / ${totalBooks} 本`;
}

function updateTimer(){
  document.getElementById('time-val').textContent=timeLeft;
}

// ─── TOAST ───────────────────────────────────────────────────────────────
let toastTimer=null;
let toastShowing=false;
function showToast(icon, msg, hint){
  document.getElementById('t-icon').textContent=icon;
  document.getElementById('t-msg').textContent=msg;
  document.getElementById('t-hint').textContent=hint||'';
  const t=document.getElementById('toast'); t.classList.add('show');
  toastShowing=true;
  // Block ALL clicks on the game ocean during toast
  const blocker = document.getElementById('click-blocker');
  if(blocker) blocker.style.display='block';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    t.classList.remove('show');
    toastShowing=false;
    if(blocker) blocker.style.display='none';
  },1000);
}

// ─── GAME FLOW ────────────────────────────────────────────────────────────
function startGame(){
  score=0; combo=0; lives=3; timeLeft=60; caught=0; answered=0;
  activeFish=[];
  document.querySelectorAll('.fish').forEach(f=>f.remove());
  document.querySelectorAll('.chest').forEach(c=>c.remove());
  closeQuestion();
  document.getElementById('gameover').style.display='none';
  document.getElementById('toast').classList.remove('show');
  gameRunning=true;

  // pick 15 random books
  const pool = shuffle([...BOOKS]).slice(0,25);
  totalBooks=pool.length;
  pool.forEach((b,i)=>setTimeout(()=>{ if(gameRunning) spawnFish(b); }, i*1200));
  spawnChests();

  updateHUD();
  updateTimer();

  timer=setInterval(()=>{
    if(!gameRunning) return;
    timeLeft--;
    updateTimer();
    if(timeLeft<=0) endGame();
  },1000);
}

function checkWin(){
  if(caught>=totalBooks){ endGame(true); }
}

function endGame(win=false){
  gameRunning=false;
  clearInterval(timer);
  closeQuestion();
  document.getElementById('go-score').textContent=`🏆 最終得分：${score} 分`;
  document.getElementById('go-caught').textContent=`🐠 成功分類：${caught} 本 / ${totalBooks} 本`;
  document.getElementById('gameover').style.display='flex';
}

function restartGame(){ startGame(); }

// ─── UTIL ─────────────────────────────────────────────────────────────────
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

// ─── INIT ─────────────────────────────────────────────────────────────────
buildOcean();
buildLegend();
runIntroSequence();

// ─── TYPEWRITER INTRO ────────────────────────────────────────────────────
function runIntroSequence() {
  const title    = document.getElementById('intro-title');
  const subtitle = document.getElementById('intro-subtitle');
  const rules    = document.getElementById('intro-rules');
  const btn      = document.getElementById('start-btn');
  const text  = '🐠 海底圖書館';
  const chars = [...text];
  chars.forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'title-char';
    span.textContent = ch === ' ' ? ' ' : ch;
    span.style.animationDelay = (i * 0.13) + 's';
    title.appendChild(span);
  });
  const totalDelay = chars.length * 130 + 350;
  setTimeout(() => {
    subtitle.style.opacity = '1';
    setTimeout(() => {
      rules.classList.add('visible');
      setTimeout(() => btn.classList.add('visible'), 500);
    }, 300);
  }, totalDelay);
}

// ─── LAUNCH — POV goggle transition ─────────────────────────────────────
function launchGame(){
  const intro       = document.getElementById('intro');
  const povAnim     = document.getElementById('pov-anim');
  const goggleFrame = document.getElementById('goggle-frame');
  const blackoutDiv = document.getElementById('goggle-blackout-div');
  const reveal      = document.getElementById('ocean-reveal');
  const cur         = document.getElementById('cursor');
  const panel       = document.getElementById('intro-panel');

  // ── PHASE 1 (0→600ms): fade out intro panel ──────────────────────────
  panel.style.transition = 'opacity .5s ease';
  panel.style.opacity    = '0';

  // ── PHASE 2 (600ms→3200ms): goggle slowly zooms in from tiny ─────────
  setTimeout(() => {
    // Set initial state (tiny, invisible)
    [povAnim, goggleFrame].forEach(el => {
      el.style.display         = 'block';
      el.style.opacity         = '0';
      el.style.transform       = 'scale(2.8)';
      el.style.transformOrigin = '50% 50%';
      el.style.transition      = 'none';
    });

    // Double rAF guarantees browser has painted the initial state
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        [povAnim, goggleFrame].forEach(el => {
          el.style.transition = 'transform 3s cubic-bezier(.25,.46,.45,.94), opacity 1s ease';
          el.style.transform  = 'scale(1)';
          el.style.opacity    = '1';
        });
        // Intro bg fades out as goggle grows
        intro.style.transition = 'opacity 1.2s ease';
        intro.style.opacity    = '0';
      });
    });
  }, 600);

  // ── PHASE 3 (3200ms→3400ms): hold on POV for 2 seconds ───────────────
  // (nothing — intentional 2s pause to enjoy the underwater view)

  // ── PHASE 4 (5400ms→6400ms): black dissolves in ───────────────────────
  setTimeout(() => {
    blackoutDiv.style.display    = 'block';
    blackoutDiv.style.opacity    = '0';
    blackoutDiv.style.transition = 'opacity 1s ease';
    void blackoutDiv.offsetWidth;
    blackoutDiv.style.opacity    = '1';
  }, 5400);

  // ── PHASE 5 (6400ms): hide everything, start game ─────────────────────
  setTimeout(() => {
    povAnim.style.display     = 'none';
    goggleFrame.style.display = 'none';
    intro.style.display       = 'none';
    blackoutDiv.style.display = 'none';
    blackoutDiv.style.opacity = '0';

    cur.classList.remove('sub');
    cur.classList.add('diver');

    reveal.style.opacity    = '1';
    reveal.style.visibility = 'visible';
    startGame();
  }, 6550);

  // ── PHASE 6 (6600ms→8200ms): ocean dissolves in from black ────────────
  setTimeout(() => {
    reveal.style.transition = 'opacity 1.6s ease';
    reveal.style.opacity    = '0';
    setTimeout(() => {
      reveal.style.visibility = 'hidden';
      reveal.style.transition = '';
    }, 1700);
  }, 6800);
}

// ─── CUSTOM CURSOR ────────────────────────────────────────────────────────
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));

// ─── TREASURE CHESTS ─────────────────────────────────────────────────────
const CHEST_REWARDS = [
  { type:'bonus', icon:'💰', text:'+20分 寶藏！',    score: 20 },
  { type:'bonus', icon:'💎', text:'+30分 寶石！',    score: 30 },
  { type:'bonus', icon:'⭐', text:'+15分 星星！',    score: 15 },
  { type:'bonus', icon:'🪙', text:'+25分 金幣！',    score: 25 },
  { type:'time',  icon:'⏳', text:'+10秒 沙漏！',   time: 10  },
  { type:'time',  icon:'🕰️', text:'+15秒 時光！',   time: 15  },
  { type:'life',  icon:'❤️', text:'多一條命！',       life: 1   },
  { type:'book',  icon:'📖', text:'神秘書籍出現！',   book: true },
  { type:'book',  icon:'📚', text:'雙倍書籍出現！',   book: 2   },
];

// chest types: 'closed'=normal, 'open'=pre-opened with treasure, 'book'=contains book
function spawnChests() {
  const floor = document.getElementById('floor');
  // 8 total positions, mix of types
  const allPos = [5, 14, 24, 35, 46, 58, 70, 82];
  const shuffled = shuffle(allPos);

  const chestConfigs = [
    { kind:'closed' }, { kind:'closed' }, { kind:'closed' },
    { kind:'open'   }, { kind:'open'   },           // pre-opened w/ treasure visible
    { kind:'book'   }, { kind:'book'   },            // books inside
    { kind:'closed' },
  ];

  shuffled.forEach((pct, i) => {
    const cfg = chestConfigs[i] || { kind:'closed' };
    // stagger appearance: some appear immediately (pre-opened), some later
    const delay = cfg.kind === 'open' ? 500 + i * 300 : 2000 + i * 1800;
    setTimeout(() => {
      if (!gameRunning && cfg.kind !== 'open') return;
      const chest = document.createElement('div');
      chest.className = 'chest';
      chest.dataset.kind = cfg.kind;
      chest.style.left = pct + '%';
      chest.style.bottom = (6 + Math.random() * 18) + 'px';
      chest.style.animationDelay = (Math.random() * 2) + 's';
      chest.innerHTML = buildChestSVG(cfg.kind);
      if (cfg.kind !== 'open') {
        chest.addEventListener('click', () => onChestClick(chest, cfg.kind));
      }
      floor.appendChild(chest);
    }, delay);
  });
}

function buildChestSVG(kind = 'closed') {
  const isOpen = kind === 'open';
  const isBook = kind === 'book';

  // base body colour slightly different per type
  const bodyCol  = isBook ? '#4a2800' : '#7c4a1e';
  const lidCol   = isBook ? '#6b3a0a' : '#9b5e2a';
  const glowCol  = isOpen ? 'rgba(245,197,24,.55)' : isBook ? 'rgba(168,230,240,.4)' : 'none';

  let interior = '';
  if (isOpen) {
    interior = `
      <ellipse cx="26" cy="20" rx="18" ry="7" fill="#c8a000" opacity=".9"/>
      <text x="17" y="18" font-size="9">💎</text>
      <text x="28" y="16" font-size="7">🪙</text>
      <text x="22" y="25" font-size="8">✨</text>`;
  } else if (isBook) {
    interior = `
      <rect x="14" y="14" width="9" height="12" rx="1" fill="#e63946"/>
      <rect x="24" y="15" width="9" height="11" rx="1" fill="#457b9d"/>
      <rect x="16" y="13" width="7" height="2" rx="1" fill="#c1121f"/>
      <rect x="25" y="14" width="6" height="2" rx="1" fill="#1d3557"/>`;
  }

  const lidPath = isOpen || isBook
    ? `<path d="M4 18 Q4 2 26 2 Q48 2 48 18 Z" fill="${lidCol}"/>
       <path d="M4 18 Q4 2 26 2 Q48 2 48 18 Z" fill="none" stroke="#c8a96e" stroke-width="2"/>`
    : `<path d="M4 22 Q4 10 26 10 Q48 10 48 22 Z" fill="${lidCol}"/>
       <path d="M4 22 Q4 10 26 10 Q48 10 48 22 Z" fill="none" stroke="#c8a96e" stroke-width="2"/>`;

  const glowEl = isOpen || isBook
    ? `<ellipse cx="26" cy="20" rx="20" ry="8" fill="${glowCol}" filter="blur(3px)"/>`
    : '';

  const sparkle = !isOpen && !isBook ? `<text x="36" y="10" font-size="10" opacity=".9">✨</text>` : '';
  const bookTag = isBook ? `<text x="2" y="10" font-size="9">📖</text>` : '';
  const openTag = isOpen ? `<text x="2" y="10" font-size="8">🔓</text>` : '';

  return `<svg width="52" height="46" viewBox="0 0 52 46" xmlns="http://www.w3.org/2000/svg">
    ${glowEl}
    <rect x="4" y="20" width="44" height="24" rx="4" fill="${bodyCol}"/>
    <rect x="4" y="20" width="44" height="24" rx="4" fill="none" stroke="#c8a96e" stroke-width="2"/>
    ${lidPath}
    ${interior}
    <rect x="4" y="20" width="44" height="5" fill="#5a3010" opacity=".4"/>
    ${!isOpen && !isBook ? `<rect x="21" y="25" width="10" height="8" rx="2" fill="#c8a96e"/>
    <circle cx="26" cy="28" r="2.5" fill="${bodyCol}"/>` : ''}
    <circle cx="10" cy="31" r="2" fill="#c8a96e"/>
    <circle cx="42" cy="31" r="2" fill="#c8a96e"/>
    <circle cx="10" cy="38" r="2" fill="#c8a96e"/>
    <circle cx="42" cy="38" r="2" fill="#c8a96e"/>
    ${sparkle}${bookTag}${openTag}
  </svg>`;
}

function onChestClick(chest, kind) {
  if (!gameRunning) return;
  chest.classList.add('opening');
  const rect = chest.getBoundingClientRect();

  let icon, text;
  if (kind === 'book') {
    // book chest — spawn fish(es)
    icon = '📖'; text = '發現書本！';
    const bonus = BOOKS[Math.floor(Math.random() * BOOKS.length)];
    setTimeout(() => { if (gameRunning) { spawnFish(bonus); totalBooks++; updateHUD(); } }, 400);
    // 30% chance second book
    if (Math.random() < 0.3) {
      const bonus2 = BOOKS[Math.floor(Math.random() * BOOKS.length)];
      setTimeout(() => { if (gameRunning) { spawnFish(bonus2); totalBooks++; updateHUD(); } }, 800);
      text = '發現兩本書！';
    }
  } else {
    const reward = CHEST_REWARDS[Math.floor(Math.random() * (CHEST_REWARDS.length - 2))]; // skip book rewards for closed chests
    icon = reward.icon; text = reward.text;
    if (reward.type === 'bonus')      score += reward.score;
    else if (reward.type === 'time') { timeLeft = Math.min(timeLeft + reward.time, 120); updateTimer(); }
    else if (reward.type === 'life')   lives = Math.min(lives + 1, 5);
  }

  const rEl = document.createElement('div');
  rEl.className = 'chest-reward';
  rEl.style.left = (rect.left + 16) + 'px';
  rEl.style.top  = (rect.top - 20) + 'px';
  rEl.innerHTML = `<span class="r-icon">${icon}</span><span class="r-text">${text}</span>`;
  document.body.appendChild(rEl);
  setTimeout(() => rEl.remove(), 2200);

  updateHUD();
  setTimeout(() => chest.remove(), 600);
}

</script>
